# Configuration file for ML-IMC

[run]
# One of: "training", "pmf-pretraining", "magic-pretraining", "simulation".
mode = "pmf-pretraining"

[inputs]
# System TOML files are loaded in this order. For parallel runs, the number of
# Julia workers must be divisible by the number of systems.
system_files = [
    "configs/methanol-data/10CH3OH/10CH3OH-CG.toml",
    "configs/methanol-data/40CH3OH/40CH3OH-CG.toml",
    "configs/methanol-data/60CH3OH/60CH3OH-CG.toml",
    "configs/methanol-data/100CH3OH/100CH3OH-CG.toml",
]
# Defines G2 symmetry functions used as neural-network descriptors.
symmetry_function_file = "configs/methanol-data/symmetry_functions.toml"

[output]
# All generated models, logs, RDFs, energies, and trajectories are written here.
dir = "run_1"
# "default" writes RDFs and energies; "verbose" also writes MC trajectories.
detail = "default"

[checkpoint]
# "none" starts from a randomly initialized model.
# Simulation mode requires model_file to point to a saved .bson model.
model_file = "none"
# Optional saved optimizer state for continuing training/pretraining.
optimizer_file = "none"

[model]
# Hidden/output layer sizes. Input size is inferred from G2 symmetry functions.
layer_sizes = [64, 64, 64, 64, 1]
# One activation per network layer transition, including identity at the input.
activations = ["identity", "relu", "relu", "relu", "identity"]
# Enables bias terms in Dense layers.
bias = true

[monte_carlo]
# Total MC steps per sampling run.
steps = 500000
# Samples are accumulated only after this many equilibration steps.
equilibration_steps = 10000
# Adjust trial displacement every N equilibration steps. Set 0 to disable.
step_adjust_frequency = 500
# Trajectory write interval; used only when output.detail = "verbose".
trajectory_frequency = 500
# Energy/RDF sampling interval. Keep it at least on the order of system size.
sample_frequency = 500

[training]
# Number of outer ML-IMC iterations.
iterations = 20
# Loss used for RDF gradient construction: "mse" or "mae".
loss = "mse"
# L2 regularization coefficient. Use 0.0 to disable.
regularization = 0.0
# If true, weight each system gradient by its current loss.
adaptive_scaling = false

[training.optimizer]
# Optimizer for the main ML-IMC training loop.
name = "Adam"
learning_rate = 0.001
# Used by optimizers that accept momentum-like parameters.
momentum = 0.9
# First and second moment decay rates for Adam-family optimizers.
decay_rates = [0.9, 0.999]

[training.lr_scheduler]
# Linear warmup length. Set 0 to start directly at learning_rate.
warmup_epochs = 0
warmup_start = 1.0e-5
# Reduce LR after this many epochs without improvement. Set 0 to disable.
patience = 5
factor = 0.8
min_lr = 1.0e-5
cooldown = 0

[pretraining]
# Number of PMF/magic pretraining epochs.
steps = 20000
# Number of random moves per system before each model update.
batch_size = 10
# Loss used for pretraining energy matching: "mse" or "mae".
loss = "mse"
regularization = 0.0
# true matches energy differences; false matches absolute energies.
use_diff_gradient = false
# false moves one particle per sample; true moves all particles.
move_all_particles = false
# Console/log output interval for pretraining.
output_frequency = 1
# Save model and optimizer state every N epochs.
save_frequency = 1000
# Prefix for saved pretraining artifacts.
output_prefix = "pt"

[pretraining.optimizer]
# Optimizer for PMF and magic pretraining.
name = "Adam"
learning_rate = 0.001
momentum = 0.9
decay_rates = [0.9, 0.999]

[pretraining.lr_scheduler]
# Scheduler settings for PMF and magic pretraining.
warmup_epochs = 1000
warmup_start = 1.0e-5
patience = 1000
factor = 0.8
min_lr = 1.0e-5
cooldown = 0

[magic_pretraining]
# Explicitly map each system_name from the system TOML to its potential file.
# This avoids relying on positional ordering.
[[magic_pretraining.potentials]]
system = "10CH3OH-CG"
file = "configs/methanol-data/methanol-IMC-potentials/10_CH3OH_magic_pot.dat"

[[magic_pretraining.potentials]]
system = "40CH3OH-CG"
file = "configs/methanol-data/methanol-IMC-potentials/40_CH3OH_magic_pot.dat"

[[magic_pretraining.potentials]]
system = "60CH3OH-CG"
file = "configs/methanol-data/methanol-IMC-potentials/60_CH3OH_magic_pot.dat"

[[magic_pretraining.potentials]]
system = "100CH3OH-CG"
file = "configs/methanol-data/methanol-IMC-potentials/100_CH3OH_magic_pot.dat"
